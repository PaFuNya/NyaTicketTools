# =============================================================
# NyaTicketTools - Ticket Configuration Template
# =============================================================
# Copy this file to config/tickets.yaml and configure your targets.

# Target events/tickets to purchase
tickets:
  # Example: Standard concert ticket
  - name: "Example Concert"           # Friendly description
    project_id: "000000"              # Bilibili project ID (from event URL)
    screen_id: "000000"               # Screen/session ID
    sku_id: "000000"                  # SKU ID (ticket tier)
    pay_money: 48000                  # Price in fen (480 yuan = 48000)
    quantity: 1                       # Number of tickets to buy
    account: "main"                   # Account name (from accounts.yaml)
    sale_start: "2026-07-01T10:00:00+08:00"  # ISO 8601 with timezone
    is_hot_project: false             # Enable aggressive mode for hot events
    enabled: false                    # Set to true when ready

# Notification settings (optional)
notifications:
  enabled: false
  webhook: ""  # Feishu/ServerChan/PushPlus/DingTalk webhook URL
